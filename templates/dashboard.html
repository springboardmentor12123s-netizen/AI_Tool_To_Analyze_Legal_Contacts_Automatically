<!DOCTYPE html>
<html>
<head>
    <title>Contract Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }
        .header {
            background: #1a1a1a;
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 25px;
            font-weight: bold;
        }
        .risk-box {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .score {
            font-size: 50px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="header">Contract Analysis Dashboard</div>

<div class="risk-box">
    <h2>Overall Risk Score</h2>
    <div class="score">{{ score }}/100</div>
</div>

</body>
</html>
